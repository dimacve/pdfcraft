services:
  pdfcraft:
    build: .
    image: ghcr.io/pdfcrafttool/pdfcraft:latest
    container_name: pdfcraft
    restart: unless-stopped
    ports:
      - "10010:80"
    volumes:
      # Paliekošie dati
      - ./.docker/data:/data
      # Docker configs un darba dati
      - ./.docker:/config
    networks:
      pdfcraft_net:
        ipv4_address: 172.244.10.10
    profiles:
      - prod

  web-dev:
    image: node:22-alpine
    working_dir: /app
    command: >
      sh -c "
        if [ ! -x node_modules/.bin/next ]; then
          echo '>>> npm ci (pirma palaišana, ~2 min)...';
          npm ci;
        else
          echo '>>> node_modules gatavs, palaiž dev serveri...';
        fi &&
        npm run dev -- --hostname 0.0.0.0 --port 3000
      "
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
    profiles:
      - dev

networks:
  pdfcraft_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.244.10.0/24

volumes:
  node_modules:
